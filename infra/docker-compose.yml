services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bm
      POSTGRES_PASSWORD: bm
      POSTGRES_DB: baby_milestones
    ports: ["5432:5432"]
    volumes: ["bm_pg:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  bm_pg:
